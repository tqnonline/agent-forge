name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Copy README into package dir for sdist
        run: cp README.md scripts/agent_forge/README.md
      - name: Build distribution
        run: python -m build scripts/agent_forge
      - name: Publish to PyPI (trusted publisher)
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: scripts/agent_forge/dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/v1.0.1.md
          generate_release_notes: true
          files: |
            scripts/agent_forge/dist/*.whl
            scripts/agent_forge/dist/*.tar.gz
