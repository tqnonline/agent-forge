name: ci-evals

on:
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'tests/evals/**'
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'tests/evals/**'

concurrency:
  group: evals-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install agent-forge package
        run: pip install -e scripts/agent_forge
      - name: Install test harness
        run: pip install -e tests
      - name: Run Layer B evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set (likely a fork PR) — skipping evals"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR run — smoke subset (one case per skill, ~46 tests, -n auto)"
            pytest tests/evals -v -n auto -m "smoke and not slow"
          else
            echo "Main push — full eval suite (230 tests, -n auto)"
            pytest tests/evals -v -n auto -m "not slow"
          fi
